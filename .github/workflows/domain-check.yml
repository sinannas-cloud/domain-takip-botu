name: Domain Kontrolu

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Telegram test mesaji gonder"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: domain-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Projeyi indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Testleri calistir
        run: npm test

      - name: Telegram ayarlarini dogrula
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"

      - name: Telegram test mesaji gonder
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_message }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e "
            const response = await fetch(
              'https://api.telegram.org/bot' + process.env.TELEGRAM_BOT_TOKEN + '/sendMessage',
              {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                  chat_id: process.env.TELEGRAM_CHAT_ID,
                  text: 'Test basarili: Domain Takip Botu 7/24 aktif.'
                })
              }
            );
            if (!response.ok) throw new Error('Telegram HTTP ' + response.status);
          "

      - name: Domainleri kontrol et
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REQUEST_TIMEOUT_MS: "15000"
          CHECK_CONCURRENCY: "3"
        run: npm run check

      - name: Degismeyen kaydi temizle
        run: node scripts/prepare-state-commit.mjs

      - name: Durum kaydini sakla
        run: |
          if git diff --quiet -- data/state.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "Domain durumunu guncelle"
          git push
